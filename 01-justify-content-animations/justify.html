<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste video</title>
    <link rel="stylesheet" href="justify.css">
</head>
<body>
    <section class="center">
        <h1><strong>justify-content</strong></h1>
        <div class="container">
            <div class="between">
                <h1>Space-Between</h1>
                <div class="row-1">
                    <div class="caixa-1"></div>
                    <div class="spacer s1"></div><div class="caixa-1"></div>
                    <div class="spacer s2"></div><div class="caixa-1"></div>
                </div>
            </div>

            <div class="evenly">
                <h1>Space-Evenly</h1>
                <div class="row-2">
                    <div class="spacer"></div><div class="caixa-2"></div>
                    <div class="spacer"></div><div class="caixa-2"></div>
                    <div class="spacer"></div><div class="caixa-2"></div>
                    <div class="spacer"></div> 
                </div>
            </div>

            <div class="around">
            <h1>Space-Around</h1>
            <div class="row-3">
                <div class="spacer side-spacer"></div> <div class="caixa-3"></div>
                
                <div class="spacer"></div><div class="caixa-3"></div>
                
                <div class="spacer"></div><div class="caixa-3"></div><div class="spacer side-spacer"></div> </div>
            </div>
    </section>
    <script src="justify.js"></script>
</body>
</html>
